name: deploy
# Despliega el sitio a GitHub Pages (staging, D-10) en cada push a main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Construir sitio (Eleventy)
        # Pages de proyecto sirve en /<repo>/. Para dominio propio/usuario-Pages (raíz),
        # define la variable de repositorio PATH_PREFIX = "/".
        env:
          PATH_PREFIX: ${{ vars.PATH_PREFIX || format('/{0}/', github.event.repository.name) }}
        run: npx @11ty/eleventy
      - name: Validar HTML
        run: npx html-validate "_site/**/*.html"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
