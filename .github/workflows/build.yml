name: build
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Construir sitio (Eleventy)
        run: npx @11ty/eleventy
      - name: Validar HTML
        run: npx html-validate "_site/**/*.html"
